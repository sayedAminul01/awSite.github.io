<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alien Institute of Computer — 220-Day Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7f5;
  --bg-elev:#ffffff;
  --bg-sunken:#eef0ec;
  --border:#dde1d9;
  --text:#1b2420;
  --text-dim:#5b665e;
  --text-faint:#8a9389;
  --accent:#2f6f5e;
  --accent-soft:#e3efe9;
  --accent-text:#ffffff;
  --tag-bg:#eef0ec;
  --shadow: 0 1px 2px rgba(20,30,25,0.04), 0 8px 24px -12px rgba(20,30,25,0.10);
  --radius:10px;
  --focus: 0 0 0 3px rgba(47,111,94,0.35);
}
:root.dark{
  --bg:#12161a;
  --bg-elev:#181d22;
  --bg-sunken:#0d1013;
  --border:#262d33;
  --text:#e7ece9;
  --text-dim:#a3ada6;
  --text-faint:#6b756f;
  --accent:#5fbf9f;
  --accent-soft:#1a2b26;
  --accent-text:#0d1511;
  --tag-bg:#1f262b;
  --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 12px 28px -14px rgba(0,0,0,0.55);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .25s ease, color .25s ease;
}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif; margin:0;}
a{color:var(--accent);}
code, .mono{font-family:'JetBrains Mono',monospace;}

/* ---------- App shell ---------- */
.app{
  display:grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: 64px 1fr;
  grid-template-areas:
    "header header"
    "sidebar main";
  height:100vh;
}
header.topbar{
  grid-area:header;
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 20px;
  border-bottom:1px solid var(--border);
  background:var(--bg-elev);
  position:relative;
  z-index:20;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  white-space:nowrap;
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#8fd6bf);
  display:flex;align-items:center;justify-content:center;
  color:#0d1511;font-weight:700;font-family:'Space Grotesk',sans-serif;
  font-size:15px;
  flex-shrink:0;
}
.brand-text{
  display:flex;
  flex-direction:column;
  line-height:1.15;
}
.brand-text .name{font-weight:700;font-size:14.5px;letter-spacing:.2px;}
.brand-text .sub{font-size:11.5px;color:var(--text-faint);}

.search-wrap{
  flex:1;
  max-width:420px;
  position:relative;
}
.search-wrap input{
  width:100%;
  padding:9px 14px 9px 36px;
  border-radius:999px;
  border:1px solid var(--border);
  background:var(--bg-sunken);
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  outline:none;
  transition:border-color .15s ease, box-shadow .15s ease;
}
.search-wrap input:focus{border-color:var(--accent); box-shadow:var(--focus);}
.search-wrap svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text-faint);
  pointer-events:none;
}
.search-hint{
  position:absolute;
  top:calc(100% + 6px);
  left:0;right:0;
  background:var(--bg-elev);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:none;
  max-height:320px;
  overflow-y:auto;
  z-index:30;
}
.search-hint.show{display:block;}
.search-hint .row{
  padding:9px 14px;
  display:flex;
  align-items:baseline;
  gap:10px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
}
.search-hint .row:last-child{border-bottom:none;}
.search-hint .row:hover, .search-hint .row.active{background:var(--accent-soft);}
.search-hint .d{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);font-weight:600;min-width:44px;}
.search-hint .t{font-size:13.5px;color:var(--text);}
.search-hint .u{font-size:11px;color:var(--text-faint); margin-left:auto; white-space:nowrap;}

.top-actions{
  display:flex;
  align-items:center;
  gap:8px;
  margin-left:auto;
}
.iconbtn{
  width:38px;height:38px;
  border-radius:9px;
  border:1px solid var(--border);
  background:var(--bg-sunken);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:background .15s ease, transform .1s ease;
}
.iconbtn:hover{background:var(--accent-soft);}
.iconbtn:active{transform:scale(.95);}
.iconbtn.menu-toggle{display:none;}

/* ---------- Sidebar ---------- */
aside.sidebar{
  grid-area:sidebar;
  background:var(--bg-elev);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:14px 10px 30px;
}
.progress-box{
  margin:4px 6px 14px;
  padding:12px 14px;
  border-radius:var(--radius);
  background:var(--bg-sunken);
  border:1px solid var(--border);
}
.progress-box .label{
  font-size:11.5px;
  color:var(--text-faint);
  display:flex;justify-content:space-between;
  margin-bottom:8px;
}
.progress-bar{
  height:6px;
  border-radius:4px;
  background:var(--border);
  overflow:hidden;
}
.progress-bar > div{
  height:100%;
  background:var(--accent);
  border-radius:4px;
  transition:width .2s ease;
}

.unit-group{margin-bottom:6px;}
.unit-head{
  display:flex;
  align-items:center;
  gap:8px;
  width:100%;
  padding:9px 10px;
  background:none;
  border:none;
  color:var(--text);
  font-family:'Space Grotesk',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  border-radius:8px;
  text-align:left;
}
.unit-head:hover{background:var(--bg-sunken);}
.unit-head .range{
  font-family:'JetBrains Mono',monospace;
  font-weight:500;
  font-size:10.5px;
  color:var(--text-faint);
  background:var(--tag-bg);
  padding:2px 6px;
  border-radius:5px;
}
.unit-head .chev{
  margin-left:auto;
  transition:transform .18s ease;
  color:var(--text-faint);
  flex-shrink:0;
}
.unit-group.open .unit-head .chev{transform:rotate(90deg);}
.day-grid{
  display:none;
  grid-template-columns:repeat(6,1fr);
  gap:5px;
  padding:8px 10px 12px;
}
.unit-group.open .day-grid{display:grid;}
.day-chip{
  aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  border-radius:6px;
  background:var(--bg-sunken);
  border:1px solid transparent;
  color:var(--text-dim);
  cursor:pointer;
  transition:all .12s ease;
}
.day-chip:hover{border-color:var(--accent); color:var(--text);}
.day-chip.active{
  background:var(--accent);
  color:var(--accent-text);
  font-weight:700;
}

/* ---------- Main content ---------- */
main.content{
  grid-area:main;
  overflow-y:auto;
  padding:32px 40px 80px;
}
.content-inner{max-width:760px; margin:0 auto;}

.daynav{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}
.daynav button{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg-elev);
  color:var(--text-dim);
  font-family:'Inter',sans-serif;
  font-size:12.5px;
  cursor:pointer;
}
.daynav button:hover:not(:disabled){border-color:var(--accent); color:var(--accent);}
.daynav button:disabled{opacity:.35; cursor:default;}
.daynav .unit-crumb{
  margin-left:auto;
  font-size:12px;
  color:var(--text-faint);
}

.day-hero{
  margin-bottom:26px;
}
.day-hero .eyebrow{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.eyebrow .num{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  font-weight:700;
  color:var(--accent);
  background:var(--accent-soft);
  padding:4px 10px;
  border-radius:999px;
}
.eyebrow .unit-name{
  font-size:12px;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.day-hero h1{
  font-size:30px;
  font-weight:700;
  line-height:1.2;
  letter-spacing:-.01em;
}

.card{
  background:var(--bg-elev);
  border:1px solid var(--border);
  border-radius:14px;
  padding:26px 28px;
  box-shadow:var(--shadow);
}
.card h4.sec{
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--accent);
  margin:22px 0 8px;
  padding-top:14px;
  border-top:1px solid var(--border);
}
.card h4.sec:first-child{margin-top:0; padding-top:0; border-top:none;}
.card p{
  font-size:14.5px;
  line-height:1.65;
  color:var(--text);
  margin:6px 0;
}
.card ul{
  margin:6px 0 6px;
  padding-left:20px;
}
.card li{
  font-size:14.5px;
  line-height:1.65;
  margin:3px 0;
  color:var(--text);
}
.card strong{color:var(--text); font-weight:600;}
.card a{text-decoration:none; border-bottom:1px solid currentColor;}
table.data-table{
  width:100%;
  border-collapse:collapse;
  margin:10px 0;
  font-size:13.5px;
}
table.data-table td, table.data-table th{
  border:1px solid var(--border);
  padding:7px 10px;
  text-align:left;
}
table.data-table th{background:var(--bg-sunken); font-weight:600;}

.instructor-note{
  margin-top:22px;
  padding:16px 18px;
  border-radius:12px;
  background:var(--accent-soft);
  border:1px solid var(--border);
}
.instructor-note .head{
  display:flex;align-items:center;gap:8px;
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:12.5px;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--accent);
  margin-bottom:6px;
}
.instructor-note p{
  font-size:13.5px;
  line-height:1.6;
  color:var(--text-dim);
  margin:0;
}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  padding:80px 20px;
  color:var(--text-faint);
}
.empty-state h2{font-size:18px;color:var(--text-dim); margin-bottom:6px;}
.empty-state p{font-size:13.5px;}

footer.credit{
  text-align:center;
  font-size:11.5px;
  color:var(--text-faint);
  padding:26px 0 6px;
}

/* ---------- Mobile ---------- */
.overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  z-index:15;
}
@media (max-width: 880px){
  .app{grid-template-columns:1fr;}
  aside.sidebar{
    position:fixed;
    top:64px;left:0;bottom:0;
    width:82%;
    max-width:320px;
    transform:translateX(-105%);
    transition:transform .25s ease;
    z-index:20;
  }
  aside.sidebar.open{transform:translateX(0);}
  .overlay.show{display:block;}
  .iconbtn.menu-toggle{display:flex;}
  main.content{padding:22px 16px 60px;}
  .day-hero h1{font-size:24px;}
  .card{padding:20px 18px;}
  .brand-text .sub{display:none;}
  .search-wrap{max-width:none;}
}
@media (max-width:520px){
  .day-grid{grid-template-columns:repeat(5,1fr);}
}

/* scrollbars */
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:5px;}
::-webkit-scrollbar-track{background:transparent;}
</style>
</head>

</div>

 "title": "Calculator", "unit": "Computer Basics", "html": "<p>Calculator</p>\n<p>Practice</p>\n<p>Daily calculations.</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 16, "title": "Snipping Tool", "unit": "Computer Basics", "html": "<p>Snipping Tool</p>\n<p>Practice</p>\n<p>Take Screenshot</p>\n<p>Crop</p>\n<p>Save</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 17, "title": "Paint", "unit": "Computer Basics", "html": "<p>Paint</p>\n<p>Draw Nature</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 18, "title": "Paint", "unit": "Computer Basics", "html": "<p>Paint</p>\n<p>Shapes</p>\n<p>Color Fill</p>\n<p>Text</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 19, "title": "Paint", "unit": "Computer Basics", "html": "<p>Paint</p>\n<p>Poster Design</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 20, "title": "Mini Project", "unit": "Computer Basics", "html": "<p>Mini Project</p>\n<p>Design Birthday Card</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 21, "title": "Taskbar", "unit": "Computer Basics", "html": "<p>Taskbar</p>\n<p>Pin Apps</p>\n<p>Unpin</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 22, "title": "Start Menu", "unit": "Computer Basics", "html": "<p>Start Menu</p>\n<p>Search Programs</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 23, "title": "Settings", "unit": "Computer Basics", "html": "<p>Settings</p>\n<p>Date</p>\n<p>Time</p>\n<p>Language</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 24, "title": "Bluetooth", "unit": "Computer Basics", "html": "<p>Bluetooth</p>\n<p>WiFi</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 25, "title": "Volume", "unit": "Computer Basics", "html": "<p>Volume</p>\n<p>Brightness</p>\n<p>Battery</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 26, "title": "Printer Basics", "unit": "Computer Basics", "html": "<p>Printer Basics</p>\n<p>Print Test Page</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 27, "title": "Keyboard Shortcuts", "unit": "Computer Basics", "html": "<p>Keyboard Shortcuts</p>\n<p>Ctrl+C</p>\n<p>Ctrl+V</p>\n<p>Ctrl+Z</p>\n<p>Alt+Tab</p>\n<p>Win+D</p>\n<p>Win+E</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 28, "title": "Shortcut Race", "unit": "Computer Basics", "html": "<p>Shortcut Race</p>\n<p>Students compete.</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 29, "title": "Revision", "unit": "Computer Basics", "html": "<p>Revision</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 30, "title": "Practical Exam", "unit": "Computer Basics", "html": "<p>Practical Exam</p>\n<p>No theory.</p>", "note": "Demonstrate each action live on the projector first, then let students repeat it on their own machine. Walk the room and check mouse/keyboard grip and posture. The correct answer to any 'challenge' is simply successful, independent completion of the listed practice steps."}, {"day": 31, "title": "Understanding Drives and Folder Organization", "unit": "File Management", "html": "<h4 class=\"sec\">Learning Objective</h4>\n<p>Understand storage drives and organize files efficiently.</p>\n<h4 class=\"sec\">Theory (10 Minutes)</h4>\n<ul>\n<li>What is a Drive?</li>\n<li>Difference between C:, D:, USB Drive</li>\n<li>Why organize files?</li>\n</ul>\n<h4 class=\"sec\">Software/Tools</h4>\n<ul>\n<li>Windows File Explorer</li>\n<li>Notepad</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Open File Explorer (Win + E).</li>\n<li>Identify available drives.</li>\n<li>Open C: drive and observe folders (do not modify system folders).</li>\n<li>Create a folder named <strong>Alien Institute Practice</strong> on another drive.</li>\n<li>Inside it, create:</li>\n<li>Documents</li>\n<li>Images</li>\n<li>Videos</li>\n<li>Music</li>\n<li>Homework</li>\n<li>Change folder view (Large Icons, Details, List).</li>\n<li>Sort folders by Name and Date.</li>\n<li>Pin File Explorer to the taskbar.</li>\n</ul>\n<h4 class=\"sec\">Keyboard Shortcuts</h4>\n<ul>\n<li>Win + E</li>\n<li>Ctrl + Shift + N</li>\n<li>F2</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Create the complete folder structure in under 5 minutes.</p>\n<h4 class=\"sec\">Homework</h4>\n<p>Create the same folder structure on a USB drive.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 32, "title": "Creating, Renaming and Deleting Files", "unit": "File Management", "html": "<h4 class=\"sec\">Learning Objective</h4>\n<p>Manage files correctly.</p>\n<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>Notepad</li>\n<li>Paint</li>\n<li>File Explorer</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Create 10 text files.</li>\n<li>Rename every file with meaningful names.</li>\n<li>Copy files to another folder.</li>\n<li>Delete five files.</li>\n<li>Restore deleted files from Recycle Bin.</li>\n<li>Permanently delete one file using Shift + Delete.</li>\n<li>Check file size and file type.</li>\n</ul>\n<h4 class=\"sec\">Keyboard Shortcuts</h4>\n<ul>\n<li>F2</li>\n<li>Delete</li>\n<li>Shift + Delete</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Rename 20 files within 10 minutes.</p>\n<h4 class=\"sec\">Homework</h4>\n<p>Create 20 files using your own naming system.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 33, "title": "Copy, Cut, Move and Duplicate Files", "unit": "File Management", "html": "<h4 class=\"sec\">Objective</h4>\n<p>Understand the difference between Copy and Move.</p>\n<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>File Explorer</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Create three folders: School, Office, Personal.</li>\n<li>Copy files between folders.</li>\n<li>Move files using Cut and Paste.</li>\n<li>Duplicate an image.</li>\n<li>Copy multiple files at once.</li>\n<li>Drag and drop files.</li>\n<li>Undo an accidental move using Ctrl + Z.</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Organize 30 mixed files into correct folders.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 34, "title": "Searching Files Like a Professional", "unit": "File Management", "html": "<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>Windows Search</li>\n<li>File Explorer</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<p>Search by:</p>\n<ul>\n<li>File Name</li>\n<li>Extension (.jpg, .pdf, .docx)</li>\n<li>Size</li>\n<li>Date Modified</li>\n<li>Keyword</li>\n</ul>\n<p>Practice locating:</p>\n<ul>\n<li>Images</li>\n<li>Videos</li>\n<li>PDFs</li>\n<li>Documents</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Find 10 requested files in less than 8 minutes.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 35, "title": "Hidden Files and Folder Options", "unit": "File Management", "html": "<h4 class=\"sec\">Learning Objective</h4>\n<p>Understand hidden files and safe usage.</p>\n<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>File Explorer Options</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Show hidden files.</li>\n<li>Hide your practice folder.</li>\n<li>Show hidden folder again.</li>\n<li>View file extensions.</li>\n<li>Change icon size.</li>\n<li>Enable Details Pane.</li>\n<li>Enable Preview Pane.</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Hide three folders and restore them.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 36, "title": "Organizing Photos and Documents", "unit": "File Management", "html": "<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>File Explorer</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<p>Create this structure:</p>\n<p>Family</p>\n<p>│</p>\n<p>├── Photos</p>\n<p>├── Documents</p>\n<p>├── Certificates</p>\n<p>├── Videos</p>\n<p>└── Important Files</p>\n<p>Rename photos using dates:</p>\n<ul>\n<li>2026-01-01 Birthday.jpg</li>\n<li>2026-02-10 Picnic.jpg</li>\n</ul>\n<p>Sort by:</p>\n<ul>\n<li>Date</li>\n<li>Name</li>\n<li>Type</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Organize 50 mixed files into correct folders.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 37, "title": "Working with USB Drives", "unit": "File Management", "html": "<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>USB Pen Drive</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Insert USB drive.</li>\n<li>Copy files to USB.</li>\n<li>Create folders.</li>\n<li>Rename folders.</li>\n<li>Delete unnecessary files.</li>\n<li>Safely eject USB.</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Back up all Documents to the USB drive.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 38, "title": "ZIP Files", "unit": "File Management", "html": "<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>Windows ZIP</li>\n<li>7-Zip (optional)</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Compress a folder.</li>\n<li>Extract a ZIP file.</li>\n<li>Compare original and compressed sizes.</li>\n<li>Rename ZIP files.</li>\n<li>Share ZIP files.</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Compress a folder containing at least 20 files.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 39, "title": "Downloads Folder Management", "unit": "File Management", "html": "<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>Google Chrome</li>\n<li>File Explorer</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<p>Download:</p>\n<ul>\n<li>PDF</li>\n<li>Image</li>\n<li>MP3 (royalty-free sample)</li>\n<li>DOCX sample</li>\n</ul>\n<p>Move each file into the correct folder.</p>\n<p>Delete duplicate downloads.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Organize the Downloads folder until no file remains unsorted.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 40, "title": "File Properties", "unit": "File Management", "html": "<h4 class=\"sec\">Practical</h4>\n<p>View:</p>\n<ul>\n<li>File Size</li>\n<li>Date Created</li>\n<li>Date Modified</li>\n<li>File Type</li>\n<li>Location</li>\n<li>Read Only Attribute</li>\n</ul>\n<p>Compare properties of different file types.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Identify the largest file in a practice folder.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 41, "title": "File Naming Standards", "unit": "File Management", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Rename files using professional formats:</p>\n<ul>\n<li>Resume_Lin_2026.docx</li>\n<li>Fee_Report_July_2026.xlsx</li>\n<li>Student_List_Batch_A.pdf</li>\n</ul>\n<p>Discuss good and bad naming practices.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Rename 50 files using a consistent naming convention.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 42, "title": "Backup and Restore Basics", "unit": "File Management", "html": "<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>File Explorer</li>\n<li>USB Drive</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Create a backup folder.</li>\n<li>Copy important files.</li>\n<li>Verify copied files.</li>\n<li>Simulate data loss by deleting originals.</li>\n<li>Restore files from the backup.</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Recover all deleted files from the backup.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 43, "title": "Real Office File Management", "unit": "File Management", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Create an office structure:</p>\n<p>Office</p>\n<p>│</p>\n<p>├── HR</p>\n<p>├── Accounts</p>\n<p>├── Sales</p>\n<p>├── Students</p>\n<p>└── Reports</p>\n<p>Sort provided documents into the correct department folders.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Complete the organization in under 15 minutes.</p>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 44, "title": "File Management Competition", "unit": "File Management", "html": "<h4 class=\"sec\">Practical Test</h4>\n<p>Students receive 100 mixed files and must:</p>\n<ul>\n<li>Create folders</li>\n<li>Rename files</li>\n<li>Move files</li>\n<li>Delete duplicates</li>\n<li>Search requested files</li>\n<li>Compress a folder</li>\n<li>Back up selected files</li>\n</ul>\n<h4 class=\"sec\">Assessment</h4>\n<ul>\n<li>Speed</li>\n<li>Accuracy</li>\n<li>Folder organization</li>\n<li>Naming consistency</li>\n</ul>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 45, "title": "Mini Project - Become a File Management Expert", "unit": "File Management", "html": "<h4 class=\"sec\">Project</h4>\n<p>The instructor provides a simulated &quot;messy computer&quot; folder containing:</p>\n<ul>\n<li>Images</li>\n<li>Videos</li>\n<li>Documents</li>\n<li>PDFs</li>\n<li>Music</li>\n<li>Duplicate files</li>\n<li>ZIP files</li>\n</ul>\n<h4 class=\"sec\">Student Tasks</h4>\n<ul>\n<li>Create an organized folder hierarchy.</li>\n<li>Rename all files professionally.</li>\n<li>Remove duplicates.</li>\n<li>Compress old project folders.</li>\n<li>Back up important documents.</li>\n<li>Create a final ZIP archive named Alien_Institute_Practice_Backup.zip.</li>\n</ul>\n<h4 class=\"sec\">Final Evaluation (100 Marks)</h4>\n<table class=\"data-table\"><tbody>\n<tr><th><strong>Skill</strong></th><th><strong>Marks</strong></th></tr>\n<tr><td>Folder Organization</td><td>20</td></tr>\n<tr><td>File Naming</td><td>15</td></tr>\n<tr><td>Copy &amp; Move Operations</td><td>15</td></tr>\n<tr><td>Search Skills</td><td>10</td></tr>\n<tr><td>Backup &amp; Restore</td><td>15</td></tr>\n<tr><td>ZIP Management</td><td>10</td></tr>\n<tr><td>Speed</td><td>10</td></tr>\n<tr><td>Accuracy</td><td>5</td></tr>\n</tbody></table>\n<h4 class=\"sec\">Skills Students Gain by Day 45</h4>\n<p>Students will be able to:</p>\n<ul>\n<li>Organize files like an office professional.</li>\n<li>Create and maintain a logical folder structure.</li>\n<li>Use keyboard shortcuts for faster file management.</li>\n<li>Search and locate files efficiently.</li>\n<li>Perform backups and restore data.</li>\n<li>Compress and extract ZIP files.</li>\n<li>Manage USB storage devices safely.</li>\n<li>Prepare a computer with well-organized files for school, office, or personal use.</li>\n</ul>", "note": "Keep a sample 'messy folder' ready on the demo PC so you can show the before/after live. The model answer for challenges is a tidy folder tree exactly matching the structure requested — show it once, then hide it and let students rebuild it themselves."}, {"day": 46, "title": "Introduction to the Internet", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Learning Objective</h4>\n<p>Understand what the Internet is and how it works.</p>\n<h4 class=\"sec\">Theory (15 Minutes)</h4>\n<ul>\n<li>What is the Internet?</li>\n<li>Website vs Webpage</li>\n<li>Browser vs Search Engine</li>\n<li>URL, Domain, HTTPS</li>\n<li>What happens when you search on Google?</li>\n</ul>\n<h4 class=\"sec\">Software / Websites</h4>\n<ul>\n<li>Google Chrome</li>\n<li>Microsoft Edge</li>\n<li><a href=\"https://www.google.com\" target=\"_blank\" rel=\"noopener\">https://www.google.com</a></li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Open Chrome.</li>\n<li>Identify:</li>\n<li>Address Bar</li>\n<li>Tabs</li>\n<li>Back/Forward</li>\n<li>Refresh</li>\n<li>Visit:</li>\n<li>google.com</li>\n<li>wikipedia.org</li>\n<li>youtube.com</li>\n<li>Type a URL directly.</li>\n<li>Search using Google.</li>\n<li>Open three tabs.</li>\n<li>Switch between tabs.</li>\n<li>Close individual tabs.</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Find the official website of:</p>\n<ul>\n<li>Indian Railways</li>\n<li>Assam Government</li>\n<li>Alien Institute of Computer (if available)</li>\n</ul>\n<h4 class=\"sec\">Homework</h4>\n<p>Write the difference between a website and a webpage with two examples.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 47, "title": "Master Google Search", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Learning Objective</h4>\n<p>Search faster and smarter.</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Search:</p>\n<ul>\n<li>Today&#x27;s weather</li>\n<li>Assam news</li>\n<li>Computer courses</li>\n<li>Best keyboard shortcuts</li>\n<li>Free computer books</li>\n<li>Images</li>\n<li>Videos</li>\n<li>PDFs</li>\n</ul>\n<p>Teach:</p>\n<ul>\n<li>Quotes (&quot; &quot;)</li>\n<li>Minus (-)</li>\n<li>site:</li>\n<li>filetype:</li>\n</ul>\n<p>Example:</p>\n<p>computer operator filetype:pdf</p>\n<p>site:gov.in scholarship</p>\n<h4 class=\"sec\">Game</h4>\n<p>Teacher asks 10 questions.</p>\n<p>First student to find the correct answer earns a point.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 48, "title": "Browser Features", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Learn:</p>\n<ul>\n<li>New Tab</li>\n<li>Incognito Mode</li>\n<li>Downloads</li>\n<li>History</li>\n<li>Bookmarks</li>\n<li>Reading List</li>\n<li>Zoom</li>\n<li>Print Page</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Bookmark:</p>\n<ul>\n<li>Google</li>\n<li>Gmail</li>\n<li>YouTube</li>\n<li>ChatGPT</li>\n<li>Alien Institute website</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Recover a website using browser history.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 49, "title": "Downloading Files Safely", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Download:</p>\n<ul>\n<li>PDF</li>\n<li>DOCX</li>\n<li>JPG</li>\n<li>MP3 (royalty-free sample)</li>\n<li>ZIP file</li>\n</ul>\n<p>Save each to the correct folder.</p>\n<p>Discuss:</p>\n<ul>\n<li>Safe Download</li>\n<li>Fake Download Buttons</li>\n<li>Virus Risks</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Download five different file types in under 10 minutes.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 50, "title": "Creating and Managing Gmail", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Learning Objective</h4>\n<p>Create and manage a professional email account.</p>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Create a Gmail account (if needed).</li>\n<li>Add a profile photo.</li>\n<li>Update recovery information.</li>\n<li>Explore Inbox, Sent, Drafts, Spam, Trash.</li>\n<li>Change the display theme.</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Students send a welcome email to the instructor.</p>\n<h4 class=\"sec\">Homework</h4>\n<p>Email yourself a short introduction.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 51, "title": "Professional Email Skills", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Compose an email with:</p>\n<ul>\n<li>Subject</li>\n<li>Greeting</li>\n<li>Message</li>\n<li>Closing</li>\n</ul>\n<p>Attach:</p>\n<ul>\n<li>One PDF</li>\n<li>One Image</li>\n</ul>\n<p>Reply to an email.</p>\n<p>Forward an email.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Send a correctly formatted email within 8 minutes.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 52, "title": "Google Drive", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Upload files</li>\n<li>Create folders</li>\n<li>Rename folders</li>\n<li>Share folders</li>\n<li>Download files</li>\n<li>Delete files</li>\n<li>Restore deleted files</li>\n</ul>\n<h4 class=\"sec\">Project</h4>\n<p>Create:</p>\n<p>Computer Course</p>\n<p>Assignments</p>\n<p>Certificates</p>\n<p>Photos</p>\n<p>Notes</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Share one folder with the teacher.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 53, "title": "Google Docs", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Create:</p>\n<ul>\n<li>Leave Application</li>\n<li>Resume</li>\n<li>Class Notes</li>\n</ul>\n<p>Practice:</p>\n<ul>\n<li>Font</li>\n<li>Color</li>\n<li>Alignment</li>\n<li>Insert Image</li>\n<li>Share Document</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Finish a one-page document in 20 minutes.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 54, "title": "Google Sheets", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Create:</p>\n<ul>\n<li>Student List</li>\n<li>Attendance Sheet</li>\n<li>Fee Register</li>\n</ul>\n<p>Use:</p>\n<ul>\n<li>SUM</li>\n<li>Average</li>\n<li>Auto Fill</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Enter 20 student records without errors.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 55, "title": "Google Maps & Navigation", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Search:</p>\n<ul>\n<li>Alien Institute of Computer</li>\n<li>Guwahati</li>\n<li>Delhi</li>\n<li>Nearest Hospital</li>\n<li>Nearest ATM</li>\n</ul>\n<p>Practice:</p>\n<ul>\n<li>Directions</li>\n<li>Satellite View</li>\n<li>Street View (where available)</li>\n<li>Distance Measurement</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Plan the fastest route from home to the institute.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 56, "title": "YouTube Learning", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Theory</h4>\n<p>Using YouTube for education.</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Search:</p>\n<ul>\n<li>MS Word Tutorial</li>\n<li>Excel Tutorial</li>\n<li>Typing Practice</li>\n<li>Computer Hardware</li>\n</ul>\n<p>Learn:</p>\n<ul>\n<li>Playlists</li>\n<li>Subtitles</li>\n<li>Playback Speed</li>\n<li>Save to Watch Later</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Find the best beginner video for Excel and explain why you chose it.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 57, "title": "Online Safety & Cyber Security", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Theory</h4>\n<ul>\n<li>Strong Passwords</li>\n<li>Phishing</li>\n<li>OTP</li>\n<li>Fake Websites</li>\n<li>Public Wi-Fi</li>\n<li>Digital Footprints</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<p>Identify:</p>\n<ul>\n<li>Safe websites</li>\n<li>Fake URLs</li>\n<li>Secure HTTPS sites</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Password Strength Competition.</p>\n<p>Students create strong passwords that follow best practices without using personal information.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 58, "title": "AI Search Tools", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Tools</h4>\n<ul>\n<li>ChatGPT</li>\n<li>Google Gemini</li>\n<li>Microsoft Copilot</li>\n<li>Perplexity</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<p>Ask AI to:</p>\n<ul>\n<li>Explain RAM</li>\n<li>Write a leave application</li>\n<li>Translate English to Assamese</li>\n<li>Create a study timetable</li>\n<li>Summarize an article</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Compare answers from two AI tools and discuss similarities and differences.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Write one good prompt and one poor prompt. Compare the results.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 59, "title": "Cloud Storage & File Sharing", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Practical</h4>\n<p>Use:</p>\n<ul>\n<li>Google Drive</li>\n<li>WeTransfer (free version)</li>\n<li>OneDrive (demonstration)</li>\n</ul>\n<p>Tasks:</p>\n<ul>\n<li>Upload a file</li>\n<li>Generate a share link</li>\n<li>Set view-only permissions</li>\n<li>Download a shared file</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Share a folder with a classmate and verify access.</p>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 60, "title": "Internet Treasure Hunt (Final Project)", "unit": "Internet & Google Workspace", "html": "<h4 class=\"sec\">Project</h4>\n<p>Students complete 20 real-world tasks.</p>\n<p>Examples:</p>\n<ul>\n<li>Find today&#x27;s weather in Guwahati.</li>\n<li>Download an Indian Constitution PDF.</li>\n<li>Find a scholarship on a government website.</li>\n<li>Locate the official website of Microsoft.</li>\n<li>Find a train from Barpeta Road to Guwahati.</li>\n<li>Save a useful YouTube tutorial.</li>\n<li>Upload a document to Google Drive.</li>\n<li>Share the document with the instructor.</li>\n<li>Send an email with the shared link.</li>\n<li>Find the distance from the institute to Guwahati using Google Maps.</li>\n<li>Translate a paragraph into English using Google Translate.</li>\n<li>Use AI to summarize a news article.</li>\n<li>Download a copyright-free image from a trusted source.</li>\n</ul>\n<h4 class=\"sec\">Assessment (100 Marks)</h4>\n<table class=\"data-table\"><tbody>\n<tr><th><strong>Skill</strong></th><th><strong>Marks</strong></th></tr>\n<tr><td>Google Search</td><td>15</td></tr>\n<tr><td>Browser Usage</td><td>10</td></tr>\n<tr><td>Gmail</td><td>15</td></tr>\n<tr><td>Google Drive</td><td>15</td></tr>\n<tr><td>Google Docs/Sheets</td><td>10</td></tr>\n<tr><td>Google Maps</td><td>10</td></tr>\n<tr><td>AI Tools</td><td>10</td></tr>\n<tr><td>Online Safety</td><td>10</td></tr>\n<tr><td>Speed &amp; Accuracy</td><td>5</td></tr>\n</tbody></table>\n<h4 class=\"sec\">Make It Fun Every Day</h4>\n<p>To keep students engaged, include one interactive activity in each class:</p>\n<ul>\n<li><strong>Search Race:</strong> Find the correct answer first using Google.</li>\n<li><strong>Bookmark Challenge:</strong> Build a useful bookmark collection.</li>\n<li><strong>Email Relay:</strong> Send and reply to emails in pairs.</li>\n<li><strong>Map Explorer:</strong> Discover famous places in India and the world.</li>\n<li><strong>Fake or </strong><strong>Real?:</strong> Decide whether a website or email is trustworthy.</li>\n<li><strong>AI Prompt Battle:</strong> Groups compete to write the best prompt for the same task.</li>\n<li><strong>Internet Scavenger Hunt:</strong> Complete a checklist of online discoveries.</li>\n<li><strong>Digital Detective:</strong> Find hidden information on a website using search operators.</li>\n</ul>", "note": "Have the listed websites/tools already open in browser tabs before class. For safety/privacy topics, prepare 2-3 real (but harmless) example scenarios to discuss as a class. The model answer for 'projects' is simply a completed version of each listed task done correctly and safely."}, {"day": 61, "title": "Introduction to Microsoft Word", "unit": "Microsoft Word", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Introduction to Microsoft Word</p>\n<h4 class=\"sec\">Theory</h4>\n<ul>\n<li>What is MS Word?</li>\n<li>Where is it used?</li>\n<li>DOCX vs PDF</li>\n<li>Saving documents</li>\n</ul>\n<h4 class=\"sec\">Software</h4>\n<ul>\n<li>Microsoft Word 2021 / 365</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Open Word</li>\n<li>New Document</li>\n<li>Save</li>\n<li>Save As</li>\n<li>Close</li>\n<li>Open again</li>\n</ul>\n<p>Practice</p>\n<p>Write</p>\n<ul>\n<li>Your Name</li>\n<li>Father&#x27;s Name</li>\n<li>Address</li>\n<li>Mobile</li>\n<li>Qualification</li>\n</ul>\n<p>Save as</p>\n<p>My Introduction.docx</p>\n<p>Challenge</p>\n<p>Save in Documents folder.</p>", "note": "Prepare a finished sample document for each day's project so students have a target to compare their work against. Emphasise consistent formatting (fonts, spacing, alignment) as the main grading criterion."}, {"day": 62, "title": "Typing Practice in Word", "unit": "Microsoft Word", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Typing Practice in Word</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Type</p>\n<ul>\n<li>English Alphabet</li>\n<li>Numbers</li>\n<li>Paragraph</li>\n<li>Simple Letter</li>\n</ul>\n<p>Practice</p>\n<p>Undo</p>\n<p>Redo</p>\n<p>Copy</p>\n<p>Paste</p>\n<p>Cut</p>\n<p>Select All</p>\n<p>Challenge</p>\n<p>Type one page without using the mouse.</p>\n<p>Keyboard shortcuts:</p>\n<p>Ctrl+A</p>\n<p>Ctrl+C</p>\n<p>Ctrl+X</p>\n<p>Ctrl+V</p>\n<p>Ctrl+Z</p>\n<p>Ctrl+Y</p>", "note": "Prepare a finished sample document for each day's project so students have a target to compare their work against. Emphasise consistent formatting (fonts, spacing, alignment) as the main grading criterion."}, {"day": 63, "title": "Font Formatting", "unit": "Microsoft Word", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Font Formatting</p>\n<p>Practice</p>\n<u  Project</h4>\n<p>Students receive a real office scenario.</p>\n<p>They must create:</p>\n<ul>\n<li>Resume</li>\n<li>Leave Application</li>\n<li>School Notice</li>\n<li>Certificate</li>\n<li>ID Card</li>\n<li>Invoice</li>\n<li>Question Paper</li>\n</ul>\n<h4 class=\"sec\">Fun Activities (Use Throughout This Module)</h4>\n<h4 class=\"sec\">Resume Competition</h4>\n<p>Students create the most professional resume.</p>\n<h4 class=\"sec\">Fastest Typist</h4>\n<p>Five-minute typing race using Word.</p>\n<h4 class=\"sec\">Office Challenge</h4>\n<p>The instructor acts as a manager and gives tasks such as:</p>\n<ul>\n<li>&quot;Prepare a leave application.&quot;</li>\n<li>&quot;Design a school notice.&quot;</li>\n<li>&quot;Make an ID card.&quot;</li>\n</ul>\n<p>Students complete them within a time limit.</p>\n<h4 class=\"sec\">Mystery Formatting</h4>\n<p>Provide a poorly formatted document. Students must fix fonts, spacing, headings, and alignment to match a reference.</p>\n<h4 class=\"sec\">Poster Day</h4>\n<p>Design an event announcement using only Word&#x27;s shapes, WordArt, and text boxes.</p>\n<h4 class=\"sec\">Certificate Factory</h4>\n<p>Each student creates a certificate for another classmate using merge-ready formatting.</p>\n<h4 class=\"sec\">Real Client Day</h4>\n<p>Give students a simulated request from a local business, school, or NGO. Examples:</p>\n<ul>\n<li>Design a fee receipt for a coaching center.</li>\n<li>Create an admission form.</li>\n<li>Make a festival invitation.</li>\n<li>Prepare a meeting notice.</li>\n</ul>\n<p>This shows students that Microsoft Word is not just software for typing. It is a practical tool that can earn them income through document design and office work.</p>\n<h4 class=\"sec\">Skills Students Will Have by Day 95</h4>\n<p>By the end of this module, students will be able to:</p>\n<ul>\n<li>Create professional documents from scratch.</li>\n<li>Format text efficiently using shortcuts.</li>\n<li>Design resumes, applications, certificates, notices, and ID cards.</li>\n<li>Work confidently with tables, images, headers, footers, and page layouts.</li>\n<li>Produce office-quality documents suitable for schools, businesses, cyber cafés, CSC centers, and government service centers.</li>\n<li>Complete common document tasks quickly and accurately under time constraints.</li>\n</ul>", "note": "Prepare a finished sample document for each day's project so students have a target to compare their work against. Emphasise consistent formatting (fonts, spacing, alignment) as the main grading criterion."}, {"day": 96, "title": "Introduction to Microsoft Excel", "unit": "Microsoft Excel", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Introduction to Microsoft Excel</p>\n<h4 class=\"sec\">Theory</h4>\n<ul>\n<li>What is Excel?</li>\n<li>Workbook vs Worksheet</li>\n<li>Rows</li>\n<li>Columns</li>\n<li>Cells</li>\n<li>Cell Address</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Open Excel</li>\n<li>Create Workbook</li>\n<li>Rename Sheet</li>\n<li>Save Workbook</li>\n<li>Open Existing Workbook</li>\n</ul>\n<p>Create this table</p>\n<table class=\"data-table\"><tbody>\n<tr><th><strong>Roll</strong></th><th><strong>Name</strong></th><th><strong>Course</strong></th></tr>\n<tr><td>1</td><td>Rahul</td><td>ADCA</td></tr>\n<tr><td>2</td><td>Priya</td><td>DCA</td></tr>\n<tr><td>3</td><td>Aman</td><td>Tally</td></tr>\n</tbody></table>\n<h4 class=\"sec\">Challenge</h4>\n<p>Enter 25 student records correctly.</p>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 97, "title": "Cell Formatting", "unit": "Microsoft Excel", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Cell Formatting</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Learn</p>\n<ul>\n<li>Font</li>\n<li>Fill Color</li>\n<li>Borders</li>\n<li>Alignment</li>\n<li>Merge Cells</li>\n<li>Wrap Text</li>\n ting second."}, {"day": 129, "title": "Keyboard Shortcuts", "unit": "Microsoft Excel", "html": "<p>Keyboard Shortcuts</p>\n<p>Ctrl+Arrow</p>\n<p>Ctrl+Home</p>\n<p>Ctrl+End</p>\n<p>F4</p>\n<p>F2</p>\n<p>Ctrl+1</p>\n<p>Alt+=</p>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 130, "title": "Weekly Practical Test", "unit": "Microsoft Excel", "html": "<p>Weekly Practical Test</p>\n<h4 class=\"sec\">WEEK 6 (Days 131-135)</h4>\n<h4 class=\"sec\">Final Projects</h4>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 131, "title": "School Management System", "unit": "Microsoft Excel", "html": "<h4 class=\"sec\">School Management System</h4>\n<p>Workbook Includes</p>\n<ul>\n<li>Students</li>\n<li>Attendance</li>\n<li>Fees</li>\n<li>Results</li>\n</ul>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 132, "title": "Small Shop Management", "unit": "Microsoft Excel", "html": "<h4 class=\"sec\">Small Shop Management</h4>\n<p>Workbook Includes</p>\n<ul>\n<li>Products</li>\n<li>Sales</li>\n<li>Expenses</li>\n<li>Profit</li>\n</ul>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 133, "title": "NGO Donation Register", "unit": "Microsoft Excel", "html": "<h4 class=\"sec\">NGO Donation Register</h4>\n<p>Workbook Includes</p>\n<ul>\n<li>Donor Name</li>\n<li>Mobile</li>\n<li>Amount</li>\n<li>Date</li>\n<li>Purpose</li>\n</ul>\n<p>This is especially relevant if students volunteer with community organizations.</p>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 134, "title": "Computer Institute Management", "unit": "Microsoft Excel", "html": "<h4 class=\"sec\">Computer Institute Management</h4>\n<p>Workbook Includes</p>\n<ul>\n<li>Admission Register</li>\n<li>Fees</li>\n<li>Attendance</li>\n<li>Certificate Status</li>\n<li>Course Completion</li>\n</ul>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 135, "title": "FINAL EXCEL PROJECT", "unit": "Microsoft Excel", "html": "<h4 class=\"sec\">FINAL EXCEL PROJECT</h4>\n<p>Each student receives a realistic business scenario.</p>\n<p>Examples:</p>\n<h4 class=\"sec\">Scenario 1</h4>\n<p>Run a stationery shop.</p>\n<p>Create:</p>\n<ul>\n<li>Sales Register</li>\n<li>Purchase Register</li>\n<li>Stock Register</li>\n<li>Profit Report</li>\n</ul>\n<h4 class=\"sec\">Scenario 2</h4>\n<p>Manage a school.</p>\n<p>Create:</p>\n<ul>\n<li>Student Database</li>\n<li>Attendance</li>\n<li>Fee Collection</li>\n<li>Result Sheet</li>\n</ul>\n<h4 class=\"sec\">Scenario 3</h4>\n<p>Run a computer institute.</p>\n<p>Create:</p>\n<ul>\n<li>Admission Register</li>\n<li>Batch List</li>\n<li>Attendance</li>\n<li>Fee Collection</li>\n<li>Certificate Tracking</li>\n</ul>\n<h4 class=\"sec\">Daily Engagement Activities</h4>\n<p>Instead of ending every class with only questions, use activities like these:</p>\n<h4 class=\"sec\">Formula Race</h4>\n<p>Students solve calculation problems using formulas. The first correct workbook earns points.</p>\n<h4 class=\"sec\">Error Detective</h4>\n<p>Provide a workbook with mistakes such as wrong formulas, missing data, or formatting errors. Students find and fix them.</p>\n<h4 class=\"sec\">Build It Faster</h4>\n<p>Give a paper register and ask students to recreate it in Excel within a time limit.</p>\n<h4 class=\"sec\">Office Simulation</h4>\n<p>One student acts as the customer, another as the data entry operator, and another as the manager. They complete tasks like entering admissions, collecting fees, or generating reports.</p>\n<h4 class=\"sec\">Dashboard Challenge</h4>\n<p>Students create colorful summaries using charts and conditional formatting from the same dataset.</p>\n<h4 class=\"sec\">Excel Escape Room</h4>\n<p>Hide clues in worksheets. Students must use sorting, filtering, formulas, and search features to unlock the next clue.</p>", "note": "Solve each day's formulas/case study on the instructor system beforehand so you have the exact correct output values ready to check against student work. Focus on formula accuracy first, formatting second."}, {"day": 136, "title": "Introduction to Microsoft PowerPoint", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Introduction to Microsoft PowerPoint</p>\n<h4 class=\"sec\">Theory</h4>\n<ul>\n<li>What is PowerPoint?</li>\n<li>Where is it used?</li>\n<li>Slides</li>\n<li>Themes</li>\n<li>Layouts</li>\n</ul>\n<h4 class=\"sec\">Software</h4>\n<ul>\n<li>Microsoft PowerPoint</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Open PowerPoint</li>\n<li>Create New Presentation</li>\n<li>Apply Theme</li>\n<li>Add New Slide</li>\n<li>Save Presentation</li>\n</ul>\n<p>Project</p>\n<p>Create</p>\n<p>&quot;My Introduction&quot;</p>\n<p>Include</p>\n<ul>\n<li>Name</li>\n<li>Photo</li>\n<li>Education</li>\n<li>Hobbies</li>\n<li>Dream Career</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Create 5 slides in 20 minutes.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 137, "title": "Design Beautiful Slides", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Design Beautiful Slides</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Learn</p>\n<ul>\n<li>Fonts</li>\n<li>Colors</li>\n<li>Icons</li>\n<li>SmartArt</li>\n<li>Pictures</li>\n<li>Alignment</li>\n</ul>\n<p>Project</p>\n<p>&quot;My Family&quot;</p>\n<h4 class=\"sec\">Activity</h4>\n<p>Students exchange presentations and give one suggestion for improvement.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 138, "title": "Animations & Transitions", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Animations &amp; Transitions</p>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Fade</li>\n<li>Zoom</li>\n<li>Fly In</li>\n<li>Morph</li>\n<li>Slide Transition</li>\n<li>Timing</li>\n</ul>\n<p>Project</p>\n<p>&quot;Computer Parts&quot;</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Use animations only where they improve the presentation. Avoid overusing effects.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 139, "title": "Professional Presentation Skills", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Professional Presentation Skills</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Create</p>\n<p>&quot;Alien Institute of Computer&quot;</p>\n<p>Slides</p>\n<ul>\n<li>About</li>\n<li>Courses</li>\n<li>Facilities</li>\n<li>Contact</li>\n</ul>\n<p>Practice presenting in front of classmates for 2 to 3 minutes.</p>\n<h4 class=\"sec\">Activity</h4>\n<p>Peer feedback on confidence and slide design.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 140, "title": "Mini Project", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Mini Project</h4>\n<p>Students choose one topic:</p>\n<ul>\n<li>Digital India</li>\n<li>Artificial Intelligence</li>\n<li>Assam Tourism</li>\n<li>Cyber Safety</li>\n<li>My Village</li>\n</ul>\n<p>Deliver a 5-minute presentation.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 141, "title": "PDF Tools", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">PDF Tools</h4>\n<h4 class=\"sec\">Software</h4>\n<ul>\n<li>PDF24 Creator</li>\n<li>PDF24 Tools (Browser)</li>\n<li>iLovePDF</li>\n<li>Smallpdf</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Convert Word to PDF</li>\n<li>Convert Image to PDF</li>\n<li>Merge PDFs</li>\n<li>Split PDFs</li>\n<li>Compress PDFs</li>\n<li>Rotate Pages</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Create one PDF from five scanned images.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 142, "title": "Scanning ****&**** Digital Documents", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Scanning ****&amp;**** Digital Documents</h4>\n<h4 class=\"sec\">Software</h4>\n<ul>\n<li>Windows Camera</li>\n<li>Microsoft Lens</li>\n<li>Google Drive Scanner</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Scan Aadhaar (sample)</li>\n<li>Scan PAN (sample)</li>\n<li>Scan Certificate (sample)</li>\n<li>Crop</li>\n<li>Enhance</li>\n<li>Save as PDF</li>\n</ul>\n<h4 class=\"sec\">Real Project</h4>\n<p>Create a folder named <strong>Student Documents</strong> with neatly scanned files.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 143, "title": "Canva Basics", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Canva Basics</h4>\n<h4 class=\"sec\">Software</h4>\n<ul>\n<li>Canva</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<p>Create</p>\n<ul>\n<li>Facebook Post</li>\n<li>Instagram Post</li>\n<li>Computer Course Poster</li>\n</ul>\n<p>Learn</p>\n<ul>\n<li>Templates</li>\n<li>Text</li>\n<li>Photos</li>\n<li>Backgrounds</li>\n<li>Elements</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Design a poster for &quot;New Admission Open&quot;.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 144, "title": "Canva Professional", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Canva Professional</h4>\n<h4 class=\"sec\">Practical</h4>\n<p>Create</p>\n<ul>\n<li>Visiting Card</li>\n<li>Certificate</li>\n<li>ID Card</li>\n<li>Invitation Card</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Students print or export their designs and compare layouts.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 145, "title": "Canva Business Projects", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Canva Business Projects</h4>\n<h4 class=\"sec\">Practical</h4>\n<p>Students create</p>\n<ul>\n<li>YouTube Thumbnail</li>\n<li>Shop Banner</li>\n<li>Sale Poster</li>\n<li>Festival Greeting</li>\n<li>Social Media Advertisement</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Design a promotional poster for <strong>Alien Institute of Computer</strong>.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 146, "title": "Google Forms", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Google Forms</h4>\n<h4 class=\"sec\">Practical</h4>\n<p>Create</p>\n<ul>\n<li>Admission Form</li>\n<li>Feedback Form</li>\n<li>Survey Form</li>\n<li>Quiz</li>\n</ul>\n<p>Learn</p>\n<ul>\n<li>Required Questions</li>\n<li>Multiple Choice</li>\n<li>Checkboxes</li>\n<li>File Upload</li>\n<li>Response Sheet</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Students fill each other&#x27;s forms using their phones.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 147, "title": "Office Productivity", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Office Productivity</h4>\n<h4 class=\"sec\">Software</h4>\n<ul>\n<li>Google Drive</li>\n<li>Google Calendar</li>\n<li>Google Keep</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Schedule classes</li>\n<li>Create notes</li>\n<li>Organize folders</li>\n<li>Share files</li>\n</ul>\n<h4 class=\"sec\">Project</h4>\n<p>Create a weekly study planner.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 148, "title": "Professional Printing", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Professional Printing</h4>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Print Preview</li>\n<li>Paper Size</li>\n<li>Margins</li>\n<li>Portrait</li>\n<li>Landscape</li>\n<li>Duplex Printing</li>\n<li>Print Selection</li>\n<li>Save as PDF</li>\n</ul>\n<h4 class=\"sec\">Activity</h4>\n<p>Print a certificate and a one-page flyer.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 149, "title": "Office Simulation Day", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Office Simulation Day</h4>\n<p>Students rotate through stations:</p>\n<h4 class=\"sec\">Station 1</h4>\n<p>Create a notice in Word.</p>\n<h4 class=\"sec\">Station 2</h4>\n<p>Update a fee sheet in Excel.</p>\n<h4 class=\"sec\">Station 3</h4>\n<p>Design a poster in Canva.</p>\n<h4 class=\"sec\">Station 4</h4>\n<p>Scan and merge documents into one PDF.</p>\n<h4 class=\"sec\">Station 5</h4>\n<p>Send the files by email.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Complete all tasks within 60 minutes.</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 150, "title": "Final Office Productivity Project", "unit": "PowerPoint & Office Productivity", "html": "<h4 class=\"sec\">Final Office Productivity Project</h4>\n<p>Each student completes a real-world assignment.</p>\n<h4 class=\"sec\">Scenario</h4>\n<p>A new coaching center has opened.</p>\n<p>Prepare:</p>\n<ul>\n<li>Admission Form (Google Forms)</li>\n<li>Fee Sheet (Excel)</li>\n<li>Notice (Word)</li>\n<li>Admission Poster (Canva)</li>\n<li>Five-slide Introduction (PowerPoint)</li>\n<li>Student Document PDF</li>\n<li>Email all files to the instructor</li>\n</ul>\n<h4 class=\"sec\">Daily Engagement Activities</h4>\n<h4 class=\"sec\">Presentation Battle</h4>\n<p>Each student presents for two minutes. Classmates vote for the clearest presentation.</p>\n<h4 class=\"sec\">Poster Challenge</h4>\n<p>Design a poster for a local event or business within 20 minutes.</p>\n<h4 class=\"sec\">Scan Master</h4>\n<p>Who can create the clearest scanned PDF with the smallest file size?</p>\n<h4 class=\"sec\">Print Shop Game</h4>\n<p>Students act as customers and computer operators. One requests documents, the other prepares, prints, and exports them.</p>\n<h4 class=\"sec\">Canva Speed Challenge</h4>\n<p>Recreate a sample poster as accurately as possible within a time limit.</p>\n<p>AI &amp; Modern Digital Productivity</p>", "note": "Keep one polished example slide deck / PDF / print job ready to show as the benchmark. Judge student work on clarity, consistency, and following the brief exactly."}, {"day": 151, "title": "Introduction to Artificial Intelligence", "unit": "Introduction to AI Tools", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Introduction to Artificial Intelligence</p>\n<h4 class=\"sec\">Theory</h4>\n<ul>\n<li>What is AI?</li>\n<li>AI vs Search Engine</li>\n<li>AI vs Human</li>\n<li>Where AI is used</li>\n</ul>\n<h4 class=\"sec\">Software</h4>\n<ul>\n<li>ChatGPT</li>\n<li>Google Gemini</li>\n<li>Microsoft Copilot</li>\n</ul>\n<h4 class=\"sec\">Practical</h4>\n<p>Students ask AI</p>\n<ul>\n<li>What is RAM?</li>\n<li>Explain Internet</li>\n<li>Explain CPU</li>\n<li>Explain Excel</li>\n<li>Explain Photoshop</li>\n</ul>\n<p>Compare answers.</p>\n<h4 class=\"sec\">Challenge</h4>\n<p>Find which AI gives the easiest explanation.</p>", "note": "Try each prompt yourself before class so you know what a good AI response looks like and can point out inaccurate or 'hallucinated' answers. Encourage students to edit AI output rather than copy it directly."}, {"day": 152, "title": "Prompt Engineering Basics", "unit": "Introduction to AI Tools", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Prompt Engineering Basics</p>\n<h4 class=\"sec\">Learn</h4>\n<p>Good Prompt</p>\n<p>Bad Prompt</p>\n<p>Clear Instructions</p>\n<p>Role Prompting</p>\n<p>Step-by-Step Prompt</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Ask AI</p>\n<ul>\n<li>Write Leave Letter</li>\n<li>Explain in Assamese</li>\n<li>Explain for Class 5</li>\n<li>Explain for Office Staff</li>\n</ul>\n<p>Compare results.</p>\n<h4 class=\"sec\">Activity</h4>\n<p>Prompt Improvement Competition.</p>", "note": "Try each prompt yourself before class so you know what a good AI response looks like and can point out inaccurate or 'hallucinated' answers. Encourage students to edit AI output rather than copy it directly."}, {"day": 153, "title": "ChatGPT Professional", "unit": "Introduction to AI Tools", "html": "<h4 class=\"sec\">Topic</h4>\n<p>ChatGPT Professional</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Create</p>\n<ul>\n<li>Resume</li>\n<li>Leave Letter</li>\n<li>Invitation</li>\n<li>Notice</li>\n<li>Biodata</li>\n<li>Meeting Minutes</li>\n</ul>\n<h4 class=\"sec\">Challenge</h4>\n<p>Finish 10 office documents within 30 minutes.</p>", "note": "Try each prompt yourself before class so you know what a good AI response looks like and can point out inaccurate or 'hallucinated' answers. Encourage students to edit AI output rather than copy it directly."}, {"day": 154, "title": "Google Gemini", "unit": "Introduction to AI Tools", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Google Gemini</p>\n<h4 class=\"sec\">Practical</h4>\n<p>Use Gemini for</p>\n<ul>\n<li>Research</li>\n<li>Translation</li>\n<li>Summaries</li>\n<li>Email Drafts</li>\n<li>Lesson Planning</li>\n</ul>\n<p>Project</p>\n<p>Create a lesson plan for &quot;Introduction to Excel.&quot;</p>", "note": "Try each prompt yourself before class so you know what a good AI response looks like and can point out inaccurate or 'hallucinated' answers. Encourage students to edit AI output rather than copy it directly."}, {"day": 155, "title": "Microsoft Copilot", "unit": "Introduction to AI Tools", "html": "<h4 class=\"sec\">Topic</h4>\n<p>Microsoft Copilot</p>\n<h4 class=\"sec\">Practical</h4>\n<ul>\n<li>Rewrite documents</li>\n<li>Improve grammar</li>\n<li>Create tables</li>\n<li>Summarize reports</li>\n<li>Generate meeting notes</li>\n</ul>\n<p>Project</p>\n<p>Convert rough notes into a clean office report.</p>", "note": "Try each prompt yourself before class so you know what a good AI response looks like and can point out
