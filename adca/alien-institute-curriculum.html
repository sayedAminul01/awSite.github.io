const UNIT_RANGES = [];
(function buildRanges(){
  let cur = null;
  CURRICULUM.forEach(d=>{
    if(!cur || cur.unit !== d.unit){
      if(cur) UNIT_RANGES.push(cur);
      cur = {unit:d.unit, start:d.day, end:d.day};
    } else {
      cur.end = d.day;
    }
  });
  if(cur) UNIT_RANGES.push(cur);
})();

const byDay = {};
CURRICULUM.forEach(d=> byDay[d.day]=d);

const sidebarEl = document.getElementById('unitList');
const contentEl = document.getElementById('contentInner');
const searchInput = document.getElementById('searchInput');
const searchHint = document.getElementById('searchHint');

function renderSidebar(activeDay){
  sidebarEl.innerHTML = UNIT_RANGES.map((u,idx)=>{
    const isOpenUnit = activeDay >= u.start && activeDay <= u.end;
    const chips = [];
    for(let d=u.start; d<=u.end; d++){
      chips.push(`<div class="day-chip ${d===activeDay?'active':''}" data-day="${d}" title="Day ${d}: ${byDay[d].title}">${d}</div>`);
    }
    return `<div class="unit-group ${isOpenUnit ? 'open':''}" data-unit-idx="${idx}">
      <button class="unit-head" data-toggle="${idx}">
        <span>${u.unit}</span>
        <span class="range">${u.start}–${u.end}</span>
        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="day-grid">${chips.join('')}</div>
    </div>`;
  }).join('');

  sidebarEl.querySelectorAll('.unit-head').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.closest('.unit-group').classList.toggle('open');
    });
  });
  sidebarEl.querySelectorAll('.day-chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      goToDay(parseInt(chip.dataset.day, 10));
      closeSidebarMobile();
    });
  });
}

function renderDay(day){
  const d = byDay[day];
  if(!d){
    contentEl.innerHTML = `<div class="empty-state"><h2>Day not found</h2><p>Try a number between 1 and 220.</p></div>`;
    return;
  }
  const idx = CURRICULUM.findIndex(x=>x.day===day);
  const prev = idx>0 ? CURRICULUM[idx-1] : null;
  const next = idx<CURRICULUM.length-1 ? CURRICULUM[idx+1] : null;

  contentEl.innerHTML = `
    <div class="daynav">
      <button id="prevBtn" ${prev?'':'disabled'}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        Day ${prev?prev.day:''}
      </button>
      <button id="nextBtn" ${next?'':'disabled'}>
        Day ${next?next.day:''}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <span class="unit-crumb">${d.unit}</span>
    </div>
    <div class="day-hero">
      <div class="eyebrow">
        <span class="num">DAY ${d.day}</span>
        <span class="unit-name">${d.unit}</span>
      </div>
      <h1>${escapeHtml(d.title)}</h1>
    </div>
    <div class="card">
      ${d.html}
    </div>
    <div class="instructor-note">
      <div class="head">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Instructor Notes
      </div>
      <p>${d.note}</p>
    </div>
    <footer class="credit">Alien Institute of Computer · Day ${d.day} of 220</footer>
  `;

  document.getElementById('prevBtn')?.addEventListener('click', ()=> prev && goToDay(prev.day));
  document.getElementById('nextBtn')?.addEventListener('click', ()=> next && goToDay(next.day));

  document.getElementById('curDayLabel').textContent = day;
  document.getElementById('curPct').textContent = Math.round((day/220)*100)+'%';
  document.getElementById('progressFill').style.width = (day/220*100)+'%';

  window.scrollTo(0,0);
  contentEl.closest('main').scrollTop = 0;
  localStorage.setItem('aic_last_day', day);
}

function goToDay(day){
  day = Math.max(1, Math.min(220, day));
  renderDay(day);
  renderSidebar(day);
  searchInput.value='';
  searchHint.classList.remove('show');
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ---------- Search ---------- */
function doSearch(q){
  q = q.trim().toLowerCase();
  if(!q){ searchHint.classList.remove('show'); return; }

  let results = [];
  if(/^\d+$/.test(q)){
    const n = parseInt(q,10);
    results = CURRICULUM.filter(d => String(d.day).startsWith(q)).slice(0,10);
    if(byDay[n]){
      results = [byDay[n], ...results.filter(r=>r.day!==n)];
    }
  } else {
    results = CURRICULUM.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.unit.toLowerCase().includes(q) ||
      d.html.toLowerCase().includes(q)
    ).slice(0,12);
  }

  if(results.length===0){
    searchHint.innerHTML = `<div class="row"><span class="t">No matches for "${escapeHtml(q)}"</span></div>`;
  } else {
    searchHint.innerHTML = results.map(r=>
      `<div class="row" data-day="${r.day}">
        <span class="d">Day ${r.day}</span>
        <span class="t">${escapeHtml(r.title)}</span>
        <span class="u">${escapeHtml(r.unit)}</span>
      </div>`
    ).join('');
  }
  searchHint.classList.add('show');

  searchHint.querySelectorAll('.row[data-day]').forEach(row=>{
    row.addEventListener('click', ()=> goToDay(parseInt(row.dataset.day,10)));
  });
}

searchInput.addEventListener('input', e => doSearch(e.target.value));
searchInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const q = e.target.value.trim();
    if(/^\d+$/.test(q)){
      goToDay(parseInt(q,10));
    } else {
      const first = searchHint.querySelector('.row[data-day]');
      if(first) goToDay(parseInt(first.dataset.day,10));
    }
  } else if(e.key==='Escape'){
    searchHint.classList.remove('show');
    searchInput.blur();
  }
});
document.addEventListener('click', e=>{
  if(!e.target.closest('.search-wrap')) searchHint.classList.remove('show');
});

/* ---------- Dark mode ---------- */
const darkToggle = document.getElementById('darkToggle');
function setDark(on){
  document.documentElement.classList.toggle('dark', on);
  localStorage.setItem('aic_dark', on ? '1':'0');
  darkToggle.innerHTML = on
    ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`
    : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
}
darkToggle.addEventListener('click', ()=> setDark(!document.documentElement.classList.contains('dark')));

const savedDark = localStorage.getItem('aic_dark');
const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
setDark(savedDark === null ? prefersDark : savedDark === '1');

/* ---------- Mobile sidebar ---------- */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('menuToggle').addEventListener('click', ()=>{
  sidebar.classList.add('open');
  overlay.classList.add('show');
});
overlay.addEventListener('click', closeSidebarMobile);
function closeSidebarMobile(){
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

/* ---------- Init ---------- */
const startDay = parseInt(localStorage.getItem('aic_last_day'), 10) || 1;
goToDay(startDay);
</script>
